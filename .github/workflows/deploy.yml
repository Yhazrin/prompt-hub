name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.SERVER_SSH_PORT }} -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Upload and deploy to server
        run: |
          tar \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='*.log' \
            -czf /tmp/prompt-hub.tar.gz .

          echo "=== Uploading to server ==="
          scp -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key -P ${{ secrets.SERVER_SSH_PORT }} \
            /tmp/prompt-hub.tar.gz \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/tmp/prompt-hub.tar.gz

          echo "=== Deploying on server ==="
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key -p ${{ secrets.SERVER_SSH_PORT }} \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            '
              cd /opt/prompt-hub
              tar -xzf /tmp/prompt-hub.tar.gz --strip-components=1
              npm install --production --silent
              DATA_DIR=/opt/prompt-hub/data timeout 120 npm run build
              pm2 delete prompt-hub 2>/dev/null || true
              pm2 start ecosystem.config.cjs
              curl -s -X POST http://127.0.0.1:3000/admin/sync || true
              timeout 30 git fetch origin main
              timeout 30 git reset --hard origin/main
              echo "Deploy complete at $(date)"
            '
