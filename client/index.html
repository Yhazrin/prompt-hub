<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Prompt Hub · AI 视觉灵感库</title>
  <meta name="description" content="AI 图片提示词灵感库，支持双向同步飞书知识库，每张图都配有可直接复制的 AI 提示词">
  <link rel="icon" type="image/svg+xml" href="/src/assets/logo.svg">
  <link rel="preconnect" href="https://images.unsplash.com">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/styles.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="#" aria-label="Prompt Hub 首页">
      <svg class="brand-logo" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect width="40" height="40" rx="12" fill="#101010"/>
        <circle cx="20" cy="20" r="10" fill="#F5F1EA"/>
        <circle cx="20" cy="20" r="5.5" fill="#101010"/>
      </svg>
      <span class="brand-name">Prompt Hub</span>
    </a>

    <nav class="primary-nav" id="primaryNav" aria-label="一级分类">
      <span class="nav-indicator" id="navIndicator" aria-hidden="true"></span>
    </nav>

    <div class="topbar-actions">
      <div class="sync-status" id="syncStatus" title="同步状态">
        <span class="sync-dot" id="syncDot"></span>
        <span class="sync-label" id="syncLabel">同步中...</span>
      </div>
      <button class="topbar-btn" id="searchBtn" aria-label="搜索">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
      </button>
      <button class="topbar-btn" id="refreshBtn" aria-label="刷新同步" title="手动同步">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
        </svg>
      </button>
      <a class="github-btn" id="githubBtn" href="https://github.com/Yhazrin/prompt-hub" target="_blank" rel="noopener noreferrer" aria-label="GitHub">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
        </svg>
        <span class="github-stars" id="githubStars">—</span>
      </a>
    </div>
  </header>

  <div class="search-overlay" id="searchOverlay" hidden>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="搜索提示词..." autocomplete="off" autofocus>
      <button class="search-close" id="searchClose" aria-label="关闭">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 6 6 18M6 6l12 12"/>
        </svg>
      </button>
    </div>
    <div class="search-results" id="searchResults"></div>
  </div>

  <div class="layout">
    <aside class="sidebar" aria-label="二级分类">
      <div class="sub-wrap">
        <span class="sub-pill" id="subPill" aria-hidden="true"></span>
        <ul class="sub-nav" id="subNav"></ul>
      </div>
    </aside>

    <main class="content">
      <div class="home" id="homeView">
        <div class="home-hero">
          <div class="hero-grid">
            <div class="hero-rail" aria-hidden="true">
              <span class="hero-index">01</span>
              <span class="hero-line"></span>
            </div>

            <div class="hero-copy">
              <span class="hero-kicker">AI IMAGE ARCHIVE</span>
              <h1>AI 视觉灵感库</h1>
              <p>收藏提示词与生图效果，支持双向同步飞书知识库，每张图都配有可直接复制的 AI 提示词</p>
              <button class="hero-link" id="heroExploreBtn" type="button">
                探索灵感
                <span aria-hidden="true">→</span>
              </button>
            </div>

            <div class="hero-scene" aria-hidden="true">
              <div class="hero-scene-inner">
                <div class="hero-geo">
                  <div class="hero-geo-ring"></div>
                  <div class="hero-geo-ring hero-geo-ring-2"></div>
                  <div class="hero-geo-cross"></div>
                  <div class="hero-geo-cross hero-geo-cross-h"></div>
                  <div class="hero-geo-dot"></div>
                  <div class="hero-geo-dot"></div>
                  <div class="hero-geo-dot"></div>
                </div>
              </div>
              <div class="hero-monogram">AI</div>
              <div class="hero-side-label">EXPLORE · IMAGINE · CREATE</div>
            </div>
          </div>
        </div>
        <div class="home-sections" id="homeSections"></div>
      </div>

      <div class="category-view" id="categoryView" hidden>
        <div class="category-header" id="categoryHeader"></div>
        <div class="grid" id="grid" aria-live="polite"></div>
      </div>
    </main>
  </div>

  <footer class="footer" role="contentinfo">
    <div class="footer-inner">
      <div class="footer-brand">
        <a class="footer-brand-mark" href="#">
          <svg viewBox="0 0 40 40" fill="none" width="28" height="28">
            <rect width="40" height="40" rx="12" fill="#101010"/>
            <circle cx="20" cy="20" r="10" fill="#F5F1EA"/>
            <circle cx="20" cy="20" r="5.5" fill="#101010"/>
          </svg>
          <span class="footer-brand-name">Prompt Hub</span>
        </a>
        <p class="footer-tagline">AI 图片提示词灵感库，支持双向同步飞书知识库，每张图都配有可直接复制的 AI 提示词</p>
      </div>
      <nav class="footer-col" aria-label="分类导航">
        <span class="footer-col-title">分类</span>
        <ul class="footer-links" id="footerCats"></ul>
      </nav>
      <div class="footer-col">
        <span class="footer-col-title">数据</span>
        <ul class="footer-links">
          <li><button type="button" id="adminSyncBtn">手动同步</button></li>
          <li><a href="/admin/sync-log" target="_blank">同步日志</a></li>
        </ul>
      </div>
    </div>
    <div class="footer-bottom">
      <span>© <span id="footerYear">2026</span> Prompt Hub · 双向同步飞书知识库</span>
      <span class="footer-meta" id="footerStats"></span>
    </div>
  </footer>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="查看大图" hidden>
    <button class="lightbox-close" id="lightboxClose" type="button" aria-label="关闭大图">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
        <path d="M6 6L18 18M18 6L6 18"/>
      </svg>
    </button>
    <button class="lightbox-nav lightbox-prev" id="lightboxPrev" type="button" aria-label="上一张">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M15 5L8 12L15 19"/></svg>
    </button>
    <button class="lightbox-nav lightbox-next" id="lightboxNext" type="button" aria-label="下一张">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M9 5L16 12L9 19"/></svg>
    </button>
    <div class="lightbox-stage">
      <figure class="lightbox-figure">
        <div class="lightbox-image-wrap" id="lightboxImageWrap">
          <img class="lightbox-image" id="lightboxImage" alt="" />
          <div class="lightbox-image-strip" id="lightboxImageStrip"></div>
        </div>
        <figcaption class="lightbox-caption">
          <div class="lightbox-caption-head">
            <span class="lightbox-caption-title">提示词</span>
            <span class="lightbox-counter" id="lightboxCounter"></span>
          </div>
          <p class="lightbox-prompt" id="lightboxPrompt"></p>
          <div class="lightbox-tags" id="lightboxTags"></div>
          <div class="lightbox-actions">
            <button class="lightbox-copy" id="lightboxCopy" type="button"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>复制提示词</button>
            <span class="lightbox-source" id="lightboxSource"></span>
          </div>
          <!-- Gallery section -->
          <div class="lightbox-gallery" id="lightboxGallery">
            <div class="gallery-header">
              <span class="gallery-title">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                实战画廊
              </span>
              <button class="gallery-upload-btn" id="galleryUploadBtn" type="button">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                上传图片
              </button>
              <input type="file" id="galleryUploadInput" accept="image/*" multiple hidden>
            </div>
            <div class="gallery-grid" id="galleryGrid"></div>
          </div>
        </figcaption>
      </figure>
    </div>
  </div>

  <!-- Scroll to top -->
  <button class="scroll-top" id="scrollTop" type="button" aria-label="回到顶部" hidden>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 15l-6-6-6 6"/></svg>
  </button>

  <!-- Toast -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="/src/script.js" type="module"></script>
</body>
</html>
